name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: jmcomic-desktop-macos
            bundle: dmg
            bridge: jmcomic-bridge
          - os: windows-latest
            artifact: jmcomic-desktop-windows
            bundle: msi
            bridge: jmcomic-bridge.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip pyinstaller -e .

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 1.6.6 --locked

      - name: Build Python bridge
        run: python -m PyInstaller --onefile --name jmcomic-bridge tauri-app/bridge.py --distpath tauri-app/dist --workpath tauri-app/build --specpath tauri-app

      - name: Build Tauri bundle
        working-directory: tauri-app/src-tauri
        run: cargo tauri build --bundles ${{ matrix.bundle }}

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: tauri-app/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Windows MSI
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: tauri-app/src-tauri/target/release/bundle/msi/*.msi

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-desktop
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show release artifacts
        run: find release-artifacts -type f -maxdepth 3 -print

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: JMComic Desktop 0.1.0
          body_path: RELEASE-0.1.0.md
          files: |
            release-artifacts/jmcomic-desktop-macos/*.dmg
            release-artifacts/jmcomic-desktop-windows/*.msi
